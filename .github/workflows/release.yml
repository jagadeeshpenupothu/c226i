name: Release

# Builds native installers for every supported platform on its own runner and
# attaches them to a draft GitHub Release:
#   - macOS   -> .dmg  (Apple Silicon + Intel)
#   - Windows -> .msi (WiX) and .exe (NSIS)
#   - Linux   -> .deb and .AppImage
#
# macOS .dmg and Windows .msi/.exe CANNOT be cross-built from Linux, so they are
# produced here on macos-latest / windows-latest runners.
#
# Trigger by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`)
# or manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-installers:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M-series) DMG
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          # Intel macOS DMG
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          # Linux .deb + .AppImage
          - platform: 'ubuntu-22.04'
            args: ''
          # Windows .msi + .exe
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build app + bundle installers (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PrintPilot ${{ github.ref_name }}'
          releaseBody: |
            PrintPilot ${{ github.ref_name }} installers.

            - macOS: `.dmg` (aarch64 = Apple Silicon, x64 = Intel)
            - Windows: `.msi` (WiX) or `.exe` (NSIS)
            - Linux: `.deb` (Debian/Ubuntu) or `.AppImage` (portable)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
