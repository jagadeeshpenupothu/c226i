name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            lipo_arch: x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: aarch64
            lipo_arch: arm64
            runner: macos-15
            target: aarch64-apple-darwin
    env:
      PRINTPILOT_RELEASE_BUILD: "1"
      PRINTPILOT_GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.PRINTPILOT_GOOGLE_DRIVE_OAUTH_CLIENT_SECRET }}
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_GOOGLE_DRIVE_OAUTH_CLIENT_ID: ${{ vars.VITE_GOOGLE_DRIVE_OAUTH_CLIENT_ID }}
      VITE_GOOGLE_DRIVE_SHARED_DRIVE_ID: ${{ vars.VITE_GOOGLE_DRIVE_SHARED_DRIVE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify release configuration
        run: node scripts/verify-release-config.mjs --release-env --source-safety

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Frontend production build
        run: npx vite build --outDir /tmp/printpilot-vite-release-dist --emptyOutDir

      - name: Verify frontend release assets
        run: node scripts/verify-release-config.mjs --frontend-dist=/tmp/printpilot-vite-release-dist

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --locked

      - name: Build Tauri macOS DMG
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Verify packaged frontend assets
        run: node scripts/verify-release-config.mjs --frontend-dist=dist

      - name: Verify and rename DMG
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          target_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          app_path="${target_dir}/macos/PrintPilot.app"
          dmg_path="$(find "${target_dir}/dmg" -maxdepth 1 -name '*.dmg' -print -quit)"
          artifact_dir="release-artifacts"
          artifact_name="PrintPilot-${version}-macos-${{ matrix.arch }}.dmg"
          artifact_path="${artifact_dir}/${artifact_name}"

          test -d "${app_path}"
          test -f "${dmg_path}"
          mkdir -p "${artifact_dir}"

          executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "${app_path}/Contents/Info.plist")"
          binary_path="${app_path}/Contents/MacOS/${executable}"
          test -x "${binary_path}"

          file "${binary_path}" | tee "${artifact_dir}/PrintPilot-${version}-macos-${{ matrix.arch }}.file.txt"
          lipo -info "${binary_path}" | tee "${artifact_dir}/PrintPilot-${version}-macos-${{ matrix.arch }}.lipo.txt"
          lipo -info "${binary_path}" | grep -q "${{ matrix.lipo_arch }}"
          otool -l "${binary_path}" | grep -A 4 'LC_VERSION_MIN_MACOSX\|LC_BUILD_VERSION' | tee "${artifact_dir}/PrintPilot-${version}-macos-${{ matrix.arch }}.otool.txt"
          codesign -dv --verbose=4 "${app_path}" 2>&1 | tee "${artifact_dir}/PrintPilot-${version}-macos-${{ matrix.arch }}.codesign.txt" || true

          cp "${dmg_path}" "${artifact_path}"
          mount_output="$(hdiutil attach -readonly -nobrowse "${artifact_path}")"
          echo "${mount_output}"
          mount_point="$(echo "${mount_output}" | awk '/\/Volumes\// {print $3; exit}')"
          test -n "${mount_point}"
          test -d "${mount_point}/PrintPilot.app"
          hdiutil detach "${mount_point}"

          shasum -a 256 "${artifact_path}" | tee "${artifact_path}.sha256"

          echo "artifact_path=${artifact_path}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            release-artifacts/PrintPilot-*-macos-${{ matrix.arch }}.dmg
            release-artifacts/PrintPilot-*-macos-${{ matrix.arch }}.dmg.sha256
            release-artifacts/PrintPilot-*-macos-${{ matrix.arch }}.*.txt
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: PrintPilot ${{ github.ref_name }}
          body: |
            PrintPilot v1.0.1 for macOS.

            Artifacts:
            - PrintPilot-1.0.1-macos-x86_64.dmg for Intel Macs
            - PrintPilot-1.0.1-macos-aarch64.dmg for Apple Silicon Macs

            The apps are not notarized. macOS Gatekeeper will warn on first launch.
          files: |
            release-artifacts/PrintPilot-*-macos-${{ matrix.arch }}.dmg
            release-artifacts/PrintPilot-*-macos-${{ matrix.arch }}.dmg.sha256
          fail_on_unmatched_files: true
